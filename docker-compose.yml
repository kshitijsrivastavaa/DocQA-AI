
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: docqa
      POSTGRES_USER: docqa
      POSTGRES_PASSWORD: docqa_pass
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docqa"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://docqa:docqa_pass@db:5432/docqa
      GROQ_API_KEY: ${GROQ_API_KEY}
      UPLOAD_DIR: /app/uploads
      FAISS_INDEX_PATH: /app/faiss_index
    volumes:
      - uploads:/app/uploads
      - faiss_data:/app/faiss_index
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pg_data:
  uploads:
  faiss_data:
